services:
  - type: web
    name: skill-gap-detector
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt && python -m spacy download en_core_web_sm && python pipeline.py ingest && python pipeline.py extract && python pipeline.py trends
    startCommand: uvicorn pipeline:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
