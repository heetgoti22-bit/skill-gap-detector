// === NEURAL NETWORK BACKGROUND ===
function NeuralBg({accentColor}){
  const ref=useRef();
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;const ctx=cv.getContext("2d");
    let w,h,raf;
    const nodes=[];const pulses=[];
    const resize=()=>{w=cv.width=window.innerWidth;h=cv.height=window.innerHeight;nodes.length=0;
      const cols=Math.floor(w/90);const rows=Math.floor(h/90);
      for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
        nodes.push({x:45+i*90+(Math.random()-.5)*30,y:45+j*90+(Math.random()-.5)*30,
          bx:45+i*90+(Math.random()-.5)*30,by:45+j*90+(Math.random()-.5)*30,
          vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,
          r:1.5+Math.random()*1.5,phase:Math.random()*Math.PI*2,speed:.003+Math.random()*.004,
          active:Math.random()<.3});}};
    resize();window.addEventListener("resize",resize);
    let tick=0;
    const addPulse=()=>{if(nodes.length<2)return;const a=Math.floor(Math.random()*nodes.length);let b=a;while(b===a)b=Math.floor(Math.random()*nodes.length);
      const na=nodes[a],nb=nodes[b];const dx=nb.x-na.x,dy=nb.y-na.y;if(Math.sqrt(dx*dx+dy*dy)<200)pulses.push({ax:na.x,ay:na.y,bx:nb.x,by:nb.y,t:0,speed:.015+Math.random()*.01});};
    const draw=()=>{
      ctx.clearRect(0,0,w,h);tick++;
      // Subtle grid
      ctx.strokeStyle="rgba(120,100,255,.02)";ctx.lineWidth=.5;
      for(let x=0;x<w;x+=90){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
      for(let y=0;y<h;y+=90){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      // Move nodes
      nodes.forEach(n=>{n.phase+=n.speed;n.x=n.bx+Math.sin(n.phase)*12+Math.sin(n.phase*.7)*6;n.y=n.by+Math.cos(n.phase*.8)*10+Math.cos(n.phase*.5)*5;});
      // Draw connections
      for(let i=0;i<nodes.length;i++){const a=nodes[i];for(let j=i+1;j<nodes.length;j++){const b=nodes[j];const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<160){const alpha=Math.pow(1-dist/160,1.5)*.12;ctx.strokeStyle=`rgba(120,100,255,${alpha})`;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}}
      // Draw nodes
      nodes.forEach(n=>{const glow=n.active?(.4+Math.sin(tick*.02+n.phase)*.3):.15;
        ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=`rgba(120,100,255,${glow})`;ctx.fill();
        if(n.active){ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);
          const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);g.addColorStop(0,`rgba(120,100,255,${glow*.3})`);g.addColorStop(1,"transparent");ctx.fillStyle=g;ctx.fill();}});
      // Pulses
      if(tick%60===0)addPulse();
      for(let i=pulses.length-1;i>=0;i--){const p=pulses[i];p.t+=p.speed;if(p.t>1){pulses.splice(i,1);continue;}
        const x=p.ax+(p.bx-p.ax)*p.t;const y=p.ay+(p.by-p.ay)*p.t;const alpha=Math.sin(p.t*Math.PI)*.8;
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
        const g=ctx.createRadialGradient(x,y,0,x,y,8);g.addColorStop(0,`rgba(80,200,170,${alpha})`);g.addColorStop(1,"transparent");ctx.fillStyle=g;ctx.fill();
        ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fillStyle=`rgba(80,200,170,${alpha})`;ctx.fill();
        // Trail
        for(let t=1;t<=4;t++){const tt=Math.max(0,p.t-t*.015);const tx=p.ax+(p.bx-p.ax)*tt;const ty=p.ay+(p.by-p.ay)*tt;
          ctx.beginPath();ctx.arc(tx,ty,1,0,Math.PI*2);ctx.fillStyle=`rgba(80,200,170,${alpha*(1-t/5)*.4})`;ctx.fill();}}
      // Floating data particles
      for(let i=0;i<5;i++){const px=(tick*(.2+i*.15)+i*200)%w;const py=h*.2+Math.sin(tick*.008+i*1.5)*h*.3;
        ctx.fillStyle=`rgba(${i%2===0?'120,100,255':'80,200,170'},${.06+Math.sin(tick*.01+i)*.04})`;
        ctx.beginPath();ctx.arc(px,py,1,0,Math.PI*2);ctx.fill();}
      raf=requestAnimationFrame(draw);};
    draw();return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",resize);};
  },[accentColor]);
  return e("canvas",{ref,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}});
}
